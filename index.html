<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Cat Meme Engine | AI Interaction</title>
  <meta name="description" content="Experience the next generation of interactive memes. Controlled by your body, powered by AI." />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Meme <span class="accent-text">Engine</span></h1>
      <p class="subtitle">Interactive AI Gesture Experience</p>
      
      <div class="toggle-container">
        <label for="meme-mode">Theme</label>
        <div class="custom-select-wrapper">
          <select id="meme-mode">
            <option value="cat">🐱 Cat Memes</option>
            <option value="one_piece">☠️ One Piece</option>
          </select>
        </div>
      </div>
    </header>
    
    <main class="content-wrapper">
      <section class="video-section">
        <div class="video-container">
          <video id="webcam" autoplay playsinline></video>
          <canvas id="output_canvas" width="640" height="480"></canvas>
          <div id="overlay">
            <button id="start-btn" class="btn-glow">Start Experience</button>
          </div>
        </div>
        <div class="stats-panel">
          <div class="stat-item">
            <span class="stat-label">Status</span>
            <span id="engine-status" class="stat-value">Ready</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Gesture</span>
            <span id="current-gesture" class="stat-value">None</span>
          </div>
        </div>
      </section>

      <section class="meme-section">
        <div class="meme-container">
          <img id="meme-output" src="https://placehold.co/400x400/0f172a/f8fafc?text=Waiting+for+Gesture" alt="Meme Output" />
          <div class="meme-overlay"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p><b>Dev Mode:</b> <code>Space</code> to log pose data | <b>Target:</b> 12 FPS</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
